<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دفتر حساباتي</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #333; }
        .balance { font-size: 24px; color: #27ae60; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: right; }
        .negative { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h1>دفتر حساباتي</h1>
    <div class="balance" id="balanceText">الرصيد: 0</div>

    <input type="number" id="amount" placeholder="المبلغ">
    <input type="text" id="desc" placeholder="الوصف (مثلاً: قطع غيار)">
    
    <select id="type">
        <option value="1">دخل (+)</option>
        <option value="-1">مصروف (-)</option>
    </select>

    <button onclick="addTransaction()">إضافة العملية</button>

    <table>
        <thead>
            <tr>
                <th>الوصف</th>
                <th>المبلغ</th>
            </tr>
        </thead>
        <tbody id="transactionList"></tbody>
    </table>
</div>

<script>
    // جلب البيانات المخزنة مسبقاً
    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

    function updateUI() {
        const list = document.getElementById('transactionList');
        const balanceText = document.getElementById('balanceText');
        list.innerHTML = '';
        let total = 0;

        transactions.forEach((t) => {
            total += t.amount;
            const row = `<tr>
                <td>${t.desc}</td>
                <td class="${t.amount < 0 ? 'negative' : ''}">${Math.abs(t.amount)}</td>
            </tr>`;
            list.innerHTML += row;
        });

        balanceText.innerText = `الرصيد: ${total}`;
    }

    function addTransaction() {
        const amount = document.getElementById('amount').value;
        const desc = document.getElementById('desc').value;
        const type = document.getElementById('type').value;

        if (amount && desc) {
            // إضافة العملية للمصفوفة
            transactions.push({
                amount: parseFloat(amount) * parseInt(type),
                desc: desc
            });

            // حفظ في ذاكرة المتصفح
            localStorage.setItem('transactions', JSON.stringify(transactions));

            // تحديث الواجهة وتفريغ الخانات
            updateUI();
            document.getElementById('amount').value = '';
            document.getElementById('desc').value = '';
        } else {
            alert("يرجى ملء كافة الخانات");
        }
    }

    // تشغيل التحديث عند فتح الصفحة
    updateUI();
</script>

</body>
</html>
