<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة حسابات يزن الاحترافية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }
        
        .header { background: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .nav-tabs { display: flex; background: #eee; padding: 5px; gap: 5px; overflow-x: auto; }
        .tab { padding: 8px 15px; background: #ddd; border-radius: 5px; cursor: pointer; white-space: nowrap; font-size: 14px; }
        .tab.active { background: var(--primary); color: white; }

        .input-box { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #fafafa; }
        .full-width { grid-column: span 2; }
        input, select, button { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        
        button.add-btn { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        button.export-btn { background: var(--success); color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 12px; font-size: 13px; border-bottom: 2px solid #eee; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; font-size: 13px; }
        
        .up { color: var(--success); font-weight: bold; }
        .down { color: var(--danger); font-weight: bold; }
        .summary { padding: 15px; background: #fff; text-align: center; font-size: 18px; font-weight: bold; border-top: 2px solid #eee; }
        
        .account-manager { padding: 10px; background: #f0f0f0; border-bottom: 1px solid #ddd; display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <strong>دفتر حساباتي</strong>
        <button class="export-btn" onclick="exportToExcel()">تصدير Excel 📊</button>
    </div>

    <!-- إدارة الحسابات -->
    <div class="account-manager">
        <input type="text" id="newAccountName" placeholder="اسم حساب جديد (شخص أو سيارة)" style="flex: 1;">
        <select id="newAccountCurrency" style="width: 100px;">
            <option value="يمني">يمني</option>
            <option value="دولار">دولار</option>
            <option value="سعودي">سعودي</option>
        </select>
        <button onclick="createNewAccount()" style="padding: 5px 15px;">+</button>
    </div>

    <!-- تبويبات الحسابات -->
    <div class="nav-tabs" id="tabsList"></div>

    <!-- إدخال البيانات -->
    <div class="input-box">
        <input type="number" id="amount" placeholder="المبلغ">
        <select id="type">
            <option value="1">دخل (+)</option>
            <option value="-1">مصروف (-)</option>
        </select>
        <input type="text" id="desc" class="full-width" placeholder="التفاصيل...">
        <button class="add-btn full-width" onclick="addEntry()">إضافة العملية</button>
    </div>

    <!-- الجدول -->
    <table>
        <thead>
            <tr>
                <th>التاريخ</th>
                <th>المبلغ</th>
                <th>التفاصيل</th>
                <th>الرصيد</th>
            </tr>
        </thead>
        <tbody id="dataBody"></tbody>
    </table>

    <div class="summary" id="totalDisplay">الرصيد الكلي: 0</div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('yazan_accounts')) || {
        currentAccount: 'عام',
        accounts: { 'عام': { currency: 'يمني', entries: [] } }
    };

    function save() { localStorage.setItem('yazan_accounts', JSON.stringify(data)); render(); }

    function createNewAccount() {
        const name = document.getElementById('newAccountName').value;
        const cur = document.getElementById('newAccountCurrency').value;
        if(name) {
            data.accounts[name] = { currency: cur, entries: [] };
            data.currentAccount = name;
            document.getElementById('newAccountName').value = '';
            save();
        }
    }

    function addEntry() {
        const amt = document.getElementById('amount').value;
        const desc = document.getElementById('desc').value;
        const type = document.getElementById('type').value;
        if(amt && desc) {
            const now = new Date();
            data.accounts[data.currentAccount].entries.push({
                amount: parseFloat(amt) * parseInt(type),
                desc: desc,
                date: now.toLocaleDateString('en-GB') + ' ' + now.getHours() + ':' + now.getMinutes(),
                timestamp: now.getTime()
            });
            document.getElementById('amount').value = '';
            document.getElementById('desc').value = '';
            save();
        }
    }

    function render() {
        const tabs = document.getElementById('tabsList');
        tabs.innerHTML = '';
        for(let acc in data.accounts) {
            const btn = document.createElement('div');
            btn.className = `tab ${data.currentAccount === acc ? 'active' : ''}`;
            btn.innerText = `${acc} (${data.accounts[acc].currency})`;
            btn.onclick = () => { data.currentAccount = acc; save(); };
            tabs.appendChild(btn);
        }

        const body = document.getElementById('dataBody');
        body.innerHTML = '';
        let balance = 0;
        const acc = data.accounts[data.currentAccount];
        
        acc.entries.sort((a,b) => a.timestamp - b.timestamp).forEach(e => {
            balance += e.amount;
            const row = `<tr>
                <td>${e.date}</td>
                <td class="${e.amount > 0 ? 'up' : 'down'}">${Math.abs(e.amount).toLocaleString()}</td>
                <td>${e.desc}</td>
                <td>${balance.toLocaleString()}</td>
            </tr>`;
            body.insertAdjacentHTML('afterbegin', row);
        });
        document.getElementById('totalDisplay').innerText = `الرصيد: ${balance.toLocaleString()} ${acc.currency}`;
    }

    function exportToExcel() {
        const acc = data.accounts[data.currentAccount];
        const worksheet = XLSX.utils.json_to_sheet(acc.entries);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, data.currentAccount);
        XLSX.writeFile(workbook, `${data.currentAccount}_حساب.xlsx`);
    }

    render();
</script>
</body>
</html>
